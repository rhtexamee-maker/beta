<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Collection | KINETIC LABS</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script type="module" src="Script/category-script.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#0c1322",
            "surface-container": "#191f2f",
            "surface-container-low": "#141b2b",
            "surface-container-high": "#232a3a",
            "surface-container-highest": "#2e3545",
            "surface-container-lowest": "#070e1d",
            "primary": "#ecd7ff",
            "primary-container": "#d8b4fe",
            "on-surface": "#dce2f7",
            "on-surface-variant": "#cdc3d0",
            "outline-variant": "#4a454f"
          }
        }
      }
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #0c1322;
      background-image: radial-gradient(circle at 2px 2px, rgba(216, 180, 254, 0.06) 1px, transparent 0);
      background-size: 40px 40px;
    }
    .glass-card {
      background: rgba(20, 27, 43, 0.75);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="font-body text-on-surface overflow-x-hidden">

<!-- Top Header -->
<header class="bg-[#0c1322]/80 backdrop-blur-lg sticky top-0 z-50 border-b border-white/5">
  <div class="flex justify-between items-center h-20 px-8 max-w-screen-2xl mx-auto">
    <div class="text-2xl font-black tracking-[-0.05em] text-[#ecd7ff] font-headline uppercase">KINETIC_LAB</div>
    
    <nav class="hidden md:flex items-center space-x-10 font-headline tracking-tighter uppercase text-sm">
      <a href="index.html" class="hover:text-primary transition-colors">Home</a>
      <a href="products.html" class="text-[#ecd7ff] border-b-2 border-[#d8b4fe] pb-1">All Gear</a>
      <a href="category.html" class="text-[#ecd7ff]">Keyboards</a>
      <a href="#" class="text-slate-400 hover:text-[#d8b4fe] transition-colors">Switches</a>
      <a href="#" class="text-slate-400 hover:text-[#d8b4fe] transition-colors">Keycaps</a>
    </nav>

    <div class="flex items-center space-x-6">
      <button onclick="window.location.href='cart.html'" class="hover:bg-white/5 p-2 rounded-full transition-all">
        <span class="material-symbols-outlined text-[#d8b4fe]">shopping_cart</span>
      </button>
      <button class="hover:bg-white/5 p-2 rounded-full transition-all">
        <span class="material-symbols-outlined text-[#d8b4fe]">account_circle</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-screen-2xl mx-auto px-8 py-12 flex flex-col lg:flex-row gap-12">
  
  <!-- Sidebar Filters -->
  <aside class="w-full lg:w-72 flex-shrink-0">
    <div class="sticky top-24 space-y-10">
      <div>
        <div class="text-[10px] tracking-[0.2em] text-primary-container font-headline mb-1">SYSTEM_NAV</div>
        <div class="font-headline text-2xl font-bold text-white">FILTER MODULE</div>
      </div>

      <!-- Price Range -->
      <section class="space-y-4">
        <h4 class="font-headline text-xs uppercase tracking-widest text-[#d8b4fe]">Price Range (৳)</h4>
        <div class="flex gap-3">
          <input id="price-min" type="number" placeholder="MIN" 
                 class="w-full bg-surface-container-lowest border-b-2 border-surface-container-highest text-sm p-3 focus:border-primary outline-none">
          <span class="text-outline-variant self-center">—</span>
          <input id="price-max" type="number" placeholder="MAX" 
                 class="w-full bg-surface-container-lowest border-b-2 border-surface-container-highest text-sm p-3 focus:border-primary outline-none">
        </div>
      </section>

      <!-- Color Filter -->
      <section class="space-y-4">
        <h4 class="font-headline text-xs uppercase tracking-widest text-[#d8b4fe]">Color Chassis</h4>
        <div id="color-filters" class="space-y-3">
          <!-- Populated by JS if needed -->
        </div>
      </section>

      <!-- Layout / Specs -->
      <section class="space-y-6">
        <h4 class="font-headline text-xs uppercase tracking-widest text-[#d8b4fe]">Configuration</h4>
        <div id="spec-filters" class="space-y-6">
          <!-- Dynamic filters will go here -->
        </div>
      </section>

      <button onclick="applyFilters()" 
              class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-headline font-bold text-xs uppercase tracking-widest rounded-xl hover:shadow-[0_0_20px_rgba(216,180,254,0.4)] transition-all">
        APPLY MATRIX
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <section class="flex-1 space-y-12">
    <!-- Header -->
    <div class="space-y-4">
      <nav class="flex items-center text-xs tracking-widest text-primary-container/70 font-headline">
        <span>HUB</span>
        <span class="mx-3">///</span>
        <span>INVENTORY</span>
        <span class="mx-3">///</span>
        <span class="text-primary">KEYBOARDS</span>
      </nav>
      
      <h1 class="text-6xl md:text-7xl font-black font-headline tracking-[-0.04em] leading-none uppercase">
        KEYBOARD_<span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">COLLECTION</span>
      </h1>
    </div>

    <!-- Product Grid -->
    <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
      <!-- Products will be dynamically loaded here by JS -->
    </div>
  </section>
</main>

<!-- Footer -->
<footer class="w-full py-12 mt-20 bg-[#080d16] border-t border-[#d8b4fe]/5">
  <div class="max-w-screen-2xl mx-auto px-8 text-center">
    <div class="text-slate-500 text-xs tracking-widest">
      ©2026 KINETIC LABORATORY • BUILT FOR THE ENTHUSIAST
    </div>
  </div>
</footer>

</body>
</html>
