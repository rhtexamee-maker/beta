<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Geek Shop | Admin Terminal</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  
  <script type="module" src="Script/admin-script.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#323949",
            "surface-container": "#191f2f",
            "surface-container-low": "#141b2b",
            "surface-container-high": "#232a3a",
            "surface-container-highest": "#2e3545",
            "surface-container-lowest": "#070e1d",
            "surface": "#0c1322",
            "primary": "#ecd7ff",
            "primary-container": "#d8b4fe",
            "on-surface": "#dce2f7",
            "on-surface-variant": "#cdc3d0",
            "background": "#0c1322"
          }
        }
      }
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .cyber-lattice {
      background-image: radial-gradient(circle at 1px 1px, rgba(236, 215, 255, 0.05) 1px, transparent 0);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

<!-- Sidebar Navigation (your exact design) -->
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-slate-950 py-8 z-50">
  <div class="px-8 mb-12">
    <h1 class="font-headline font-black text-purple-400 text-2xl tracking-tighter">Geek Admin</h1>
    <p class="font-body text-[10px] uppercase tracking-[0.2em] text-slate-500 mt-1">Terminal Access</p>
  </div>
  <nav class="flex-1">
    <ul class="space-y-1">
      <li><a class="flex items-center gap-3 bg-purple-500/10 text-purple-300 rounded-r-full py-3 px-6 border-l-4 border-purple-400 font-body text-sm uppercase tracking-widest" href="#"><span class="material-symbols-outlined">keyboard</span><span>Inventory</span></a></li>
      <li><a class="flex items-center gap-3 text-slate-500 py-3 px-6 hover:bg-slate-900 hover:text-slate-200 transition-all duration-200 ease-in-out font-body text-sm uppercase tracking-widest" href="#"><span class="material-symbols-outlined">shopping_bag</span><span>Orders</span></a></li>
    </ul>
  </nav>
  <div class="px-6 mt-auto">
    <button onclick="logoutAdmin()" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-lg text-[10px] font-bold tracking-widest transition-colors">LOGOUT</button>
  </div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 min-h-screen cyber-lattice flex flex-col">
  <!-- Top Bar -->
  <header class="sticky top-0 z-40 bg-[#0c1322]/60 backdrop-blur-xl w-full">
    <div class="flex justify-between items-center px-8 py-6 max-w-screen-2xl mx-auto">
      <h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">Inventory Management</h2>
    </div>
  </header>

  <section class="p-8 space-y-8 flex-1">
    <!-- Login Panel -->
    <div id="login-panel" class="max-w-md mx-auto bg-surface-container-low rounded-2xl p-8">
      <h2 class="text-2xl font-bold mb-8 text-center">Admin Login</h2>
      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-sm mb-2">Email</label>
          <input id="admin-email" type="email" required class="w-full px-4 py-3 bg-surface rounded-xl border border-white/10 focus:border-primary">
        </div>
        <div>
          <label class="block text-sm mb-2">Password</label>
          <input id="admin-pass" type="password" required class="w-full px-4 py-3 bg-surface rounded-xl border border-white/10 focus:border-primary">
        </div>
        <button type="submit" class="w-full py-4 bg-primary text-on-primary rounded-2xl font-semibold text-lg">Login to Admin</button>
      </form>
    </div>

    <!-- Admin Dashboard (Hidden until login) -->
    <div id="admin-panel" class="hidden space-y-10">

      <!-- Quick Stats -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-surface-container-low p-6 rounded-2xl border border-white/5">
          <p class="text-xs uppercase tracking-widest text-slate-500">Total Products</p>
          <p id="total-products" class="text-4xl font-headline font-bold mt-2">0</p>
        </div>
        <div class="bg-surface-container-low p-6 rounded-2xl border border-white/5">
          <p class="text-xs uppercase tracking-widest text-slate-500">Pending Orders</p>
          <p id="pending-orders" class="text-4xl font-headline font-bold mt-2">0</p>
        </div>
      </div>

      <!-- Add Product Form -->
      <div class="bg-surface-container-low rounded-2xl p-8">
        <h3 class="font-headline text-2xl font-bold mb-6">Add New Product</h3>
        <form id="add-product-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div><label>Name</label><input id="add-name" required class="w-full px-4 py-3 bg-surface rounded-xl"></div>
          <div><label>Price (tk)</label><input id="add-price" required class="w-full px-4 py-3 bg-surface rounded-xl"></div>
          <div><label>Discount (tk)</label><input id="add-discount" value="0" class="w-full px-4 py-3 bg-surface rounded-xl"></div>
          <div><label>Image URLs (comma separated)</label><input id="add-images" required class="w-full px-4 py-3 bg-surface rounded-xl"></div>
          <div><label>Category</label>
            <select id="add-category" required class="w-full px-4 py-3 bg-surface rounded-xl">
              <option value="Keycaps">Keycaps</option>
              <option value="Switches">Switches</option>
              <option value="Keyboard and Mouse">Keyboard and Mouse</option>
              <option value="Accessories and Collectables">Accessories and Collectables</option>
            </select>
          </div>
          <div><label>Color</label><input id="add-color" class="w-full px-4 py-3 bg-surface rounded-xl"></div>
          <div><label>Stock</label><input id="add-stock" type="number" value="0" class="w-full px-4 py-3 bg-surface rounded-xl"></div>
          <div><label>Availability</label>
            <select id="add-availability" required class="w-full px-4 py-3 bg-surface rounded-xl">
              <option value="Ready">Ready to Order</option>
              <option value="Pre Order">Pre Order</option>
              <option value="Upcoming">Upcoming</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label><input type="checkbox" id="add-hotdeal"> Hot Deal</label>
          </div>
          <div class="md:col-span-2">
            <label>Specification</label>
            <textarea id="add-desc" class="w-full px-4 py-3 bg-surface rounded-xl h-20"></textarea>
          </div>
          <div class="md:col-span-2">
            <label>Detailed Description</label>
            <textarea id="add-detailed-desc" class="w-full px-4 py-3 bg-surface rounded-xl h-32"></textarea>
          </div>
          <button type="submit" class="md:col-span-2 py-4 bg-primary text-on-primary rounded-2xl font-bold text-lg">Add Product</button>
        </form>
      </div>

      <!-- Products Table -->
      <div class="bg-surface-container-low rounded-2xl overflow-hidden">
        <div class="px-8 py-6 border-b">
          <h3 class="font-headline text-xl font-bold">All Products</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="bg-surface-container-lowest text-xs uppercase tracking-widest">
                <th class="px-8 py-4 text-left">Product</th>
                <th class="px-8 py-4">Category</th>
                <th class="px-8 py-4">Price</th>
                <th class="px-8 py-4">Stock</th>
                <th class="px-8 py-4">Actions</th>
              </tr>
            </thead>
            <tbody id="products-body" class="divide-y divide-white/10"></tbody>
          </table>
        </div>
      </div>

      <!-- Orders Section -->
      <div class="bg-surface-container-low rounded-2xl p-8">
        <h3 class="font-headline text-xl font-bold mb-6">Recent Orders</h3>
        <div id="orders-body" class="space-y-4"></div>
      </div>
    </div>
  </section>
</main>

</body>
</html>
