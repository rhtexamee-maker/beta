<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Geek Shop | Admin Terminal</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  
  <script type="module" src="Script/admin-script.js"></script>

  <script id="tailwind-config">
    tailwind.config = { /* your tailwind config */ }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .cyber-lattice {
      background-image: radial-gradient(circle at 1px 1px, rgba(236, 215, 255, 0.05) 1px, transparent 0);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body">

<!-- Sidebar (your exact design) -->
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-slate-950 py-8 z-50">
  <!-- ... your sidebar code remains exactly the same ... -->
  <div class="px-6 mt-auto">
    <button onclick="logoutAdmin()" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-lg text-[10px] font-bold tracking-widest transition-colors">
      LOGOUT
    </button>
  </div>
</aside>

<main class="md:ml-64 min-h-screen cyber-lattice flex flex-col">
  <!-- Top Bar (your design) -->
  <!-- ... keep your header ... -->

  <section class="p-8 space-y-8 flex-1">
    <!-- Login Panel (added back) -->
    <div id="login-panel" class="card max-w-md mx-auto">
      <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm mb-1">Email</label>
          <input id="admin-email" type="email" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border border-white/10">
        </div>
        <div>
          <label class="block text-sm mb-1">Password</label>
          <input id="admin-pass" type="password" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border border-white/10">
        </div>
        <button type="submit" class="w-full py-3 bg-primary text-on-primary rounded-xl font-semibold">Login</button>
      </form>
    </div>

    <!-- Main Admin Panel -->
    <div id="admin-panel" class="hidden">
      <!-- Your Quick Stats, Product Table, Orders, etc. remain here -->
      <!-- ... paste the rest of your admin content (Quick Stats, Product Table, Orders) ... -->

      <!-- Add Product Form (Full original fields restored) -->
      <div class="bg-surface-container-low rounded-2xl p-8 mt-8">
        <h2 class="text-2xl font-bold mb-6">Add New Product</h2>
        <form id="add-product-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label>Name</label>
            <input id="add-name" required class="w-full px-4 py-3 bg-surface-container rounded-xl">
          </div>
          <div>
            <label>Price (tk)</label>
            <input id="add-price" required class="w-full px-4 py-3 bg-surface-container rounded-xl">
          </div>
          <div>
            <label>Discount (tk)</label>
            <input id="add-discount" value="0" class="w-full px-4 py-3 bg-surface-container rounded-xl">
          </div>
          <div>
            <label>Image URLs (comma-separated)</label>
            <input id="add-images" required class="w-full px-4 py-3 bg-surface-container rounded-xl">
          </div>
          <div>
            <label>Category</label>
            <select id="add-category" required class="w-full px-4 py-3 bg-surface-container rounded-xl">
              <option value="Keycaps">Keycaps</option>
              <option value="Switches">Switches</option>
              <option value="Keyboard and Mouse">Keyboard and Mouse</option>
              <option value="Accessories and Collectables">Accessories and Collectables</option>
            </select>
          </div>
          <div>
            <label>Color</label>
            <input id="add-color" class="w-full px-4 py-3 bg-surface-container rounded-xl">
          </div>
          <div>
            <label>Stock</label>
            <input id="add-stock" type="number" value="0" class="w-full px-4 py-3 bg-surface-container rounded-xl">
          </div>
          <div>
            <label>Availability</label>
            <select id="add-availability" required class="w-full px-4 py-3 bg-surface-container rounded-xl">
              <option value="Ready">Ready to Order</option>
              <option value="Pre Order">Pre Order</option>
              <option value="Upcoming">Upcoming</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label><input type="checkbox" id="add-hotdeal"> Hot Deal</label>
          </div>
          <div class="md:col-span-2">
            <label>Specification</label>
            <textarea id="add-desc" class="w-full px-4 py-3 bg-surface-container rounded-xl h-24"></textarea>
          </div>
          <div class="md:col-span-2">
            <label>Detailed Description</label>
            <textarea id="add-detailed-desc" class="w-full px-4 py-3 bg-surface-container rounded-xl h-32"></textarea>
          </div>
          <button type="submit" class="md:col-span-2 py-4 bg-primary text-on-primary rounded-2xl font-bold">Add Product</button>
        </form>
      </div>
    </div>
  </section>
</main>
</body>
</html>
