
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Geek Shop | Checkout</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script type="module" src="Script/checkout-script.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#323949",
            "surface-container": "#191f2f",
            "surface-container-low": "#141b2b",
            "surface-container-high": "#232a3a",
            "surface-container-highest": "#2e3545",
            "surface-container-lowest": "#070e1d",
            "surface": "#0c1322",
            "primary": "#ecd7ff",
            "primary-container": "#d8b4fe",
            "on-surface": "#dce2f7",
            "on-surface-variant": "#cdc3d0"
          }
        }
      }
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .glass-panel {
      background: rgba(25, 31, 47, 0.75);
      backdrop-filter: blur(16px);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body">

<!-- Top Bar -->
<header class="sticky top-0 z-50 bg-[#0c1322]/80 backdrop-blur-xl border-b border-white/5">
  <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
    <div class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-purple-300 to-purple-400">
      The Geek Shop
    </div>
    <div class="text-sm font-medium text-on-surface-variant">Secure Checkout</div>
  </div>
</header>

<main class="max-w-screen-2xl mx-auto px-8 py-12">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">

    <!-- Left: Delivery & Payment Info -->
    <div class="lg:col-span-7 space-y-10">
      <div>
        <h1 class="font-headline text-4xl font-bold tracking-tight mb-2">Checkout</h1>
        <p class="text-on-surface-variant">Please review your order and complete payment</p>
      </div>

      <!-- Delivery Information -->
      <div class="glass-panel rounded-3xl p-8 border border-white/5">
        <h2 class="font-headline text-xl font-bold mb-6">Delivery Information</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Full Name</label>
            <input id="co-name" type="text" required 
                   class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl px-5 py-4 focus:border-primary outline-none">
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Phone Number</label>
            <input id="co-phone" type="tel" required 
                   class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl px-5 py-4 focus:border-primary outline-none">
          </div>
        </div>
        <div class="mt-6">
          <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Full Address</label>
          <textarea id="co-address" rows="3" required 
                    class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl px-5 py-4 focus:border-primary outline-none resize-y"></textarea>
        </div>
      </div>

      <!-- Payment Method -->
      <div class="glass-panel rounded-3xl p-8 border border-white/5">
        <h2 class="font-headline text-xl font-bold mb-6">Payment Method</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button onclick="selectPayment('bkash')" id="bkash-btn"
                  class="payment-option p-6 rounded-2xl border-2 border-transparent hover:border-primary transition-all text-left">
            <span class="material-symbols-outlined text-3xl mb-3 block">account_balance_wallet</span>
            <p class="font-medium">bKash</p>
            <p class="text-xs text-on-surface-variant">Instant Mobile Payment</p>
          </button>

          <button onclick="selectPayment('cod')" id="cod-btn"
                  class="payment-option p-6 rounded-2xl border-2 border-transparent hover:border-primary transition-all text-left">
            <span class="material-symbols-outlined text-3xl mb-3 block">local_shipping</span>
            <p class="font-medium">Cash on Delivery</p>
            <p class="text-xs text-on-surface-variant">Pay when received</p>
          </button>
        </div>

        <div id="payment-details" class="mt-8 hidden">
          <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2" id="payment-label"></label>
          <input id="co-payment-number" readonly 
                 class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl px-5 py-4">
        </div>
      </div>
    </div>

    <!-- Right: Order Summary -->
    <div class="lg:col-span-5">
      <div class="glass-panel rounded-3xl p-8 sticky top-24">
        <h2 class="font-headline text-xl font-bold mb-6">Order Summary</h2>
        
        <div id="order-items" class="space-y-6 mb-8">
          <!-- Items added by JS -->
        </div>

        <div class="border-t border-white/10 pt-6 space-y-4">
          <div class="flex justify-between text-sm">
            <span class="text-on-surface-variant">Subtotal</span>
            <span id="subtotal" class="font-medium">৳0</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-on-surface-variant">Delivery Charge</span>
            <span id="delivery-fee" class="font-medium">৳0</span>
          </div>
          <div class="flex justify-between text-lg font-bold border-t border-white/10 pt-4">
            <span>Total</span>
            <span id="grand-total" class="text-primary">৳0</span>
          </div>
        </div>

        <button onclick="placeOrder()" 
                class="w-full mt-10 py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-headline font-bold text-lg rounded-2xl hover:brightness-110 transition-all">
          CONFIRM & PLACE ORDER
        </button>

        <p class="text-center text-xs text-on-surface-variant mt-6">
          By placing this order, you agree to our <a href="#" class="underline">Terms & Conditions</a>
        </p>
      </div>
    </div>
  </div>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 md:hidden bg-[#0c1322]/80 backdrop-blur-lg border-t border-white/5 z-50">
  <a href="index.html" class="flex flex-col items-center text-slate-500">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Home</span>
  </a>
  <a href="products.html" class="flex flex-col items-center text-slate-500">
    <span class="material-symbols-outlined">grid_view</span>
    <span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Shop</span>
  </a>
  <a href="#" class="flex flex-col items-center text-slate-500">
    <span class="material-symbols-outlined">shopping_cart</span>
    <span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Cart</span>
  </a>
</nav>

</body>
</html>
