<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>The Geek Shop | Home</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
}
body {
  font-family: 'Inter', sans-serif;
  background-color: #0c1322;
  color: #dce2f7;
}
.headline-font { font-family: 'Space Grotesk', sans-serif; }
</style>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        background:"#0c1322",
        surface:"#0c1322",
        primary:"#ecd7ff",
        "primary-container":"#d8b4fe",
        "on-primary":"#3f2160",
        "on-primary-fixed":"#29074a",
        "surface-container":"#191f2f",
        "surface-container-low":"#141b2b",
        "surface-container-highest":"#2e3545",
        "surface-variant":"#2e3545",
        "on-surface":"#dce2f7",
        "on-surface-variant":"#cdc3d0",
        outline:"#968e9a",
        "outline-variant":"#4a454f"
      }
    }
  }
}
</script>
</head>

<body class="bg-background text-on-surface">

<!-- ================= HEADER ================= -->
<header class="bg-[#0c1322]/60 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
  <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto">

    <div class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-purple-200 to-purple-400 headline-font">
      The Geek Shop
    </div>

    <nav class="hidden md:flex gap-8 headline-font">
      <a class="text-slate-400 hover:text-purple-200">Keyboards</a>
      <a class="text-slate-400 hover:text-purple-200">Switches</a>
      <a class="text-slate-400 hover:text-purple-200">Keycaps</a>
      <a class="text-slate-400 hover:text-purple-200">Desk Mats</a>
    </nav>

    <div class="flex items-center gap-6">
      <span id="cart-count" class="text-purple-300 font-bold">0</span>
      <span class="material-symbols-outlined text-purple-300">shopping_cart</span>
    </div>

  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="max-w-screen-2xl mx-auto px-8">

<!-- ================= HERO ================= -->
<section class="relative min-h-[819px] flex items-center pt-12 pb-24 overflow-hidden">

  <div class="grid md:grid-cols-12 gap-8 w-full items-center">

    <!-- LEFT -->
    <div class="md:col-span-7 flex flex-col gap-8">

      <span id="hero-badge"
        class="uppercase tracking-widest text-primary text-sm font-bold bg-primary/10 px-4 py-1 rounded-full">
        New Arrival
      </span>

      <h1 id="hero-title"
        class="headline-font text-6xl md:text-8xl font-bold leading-[0.9]">
        LOADING...
      </h1>

      <p id="hero-desc"
        class="text-lg text-on-surface-variant max-w-lg">
      </p>

      <div class="flex gap-4">
        <button id="hero-shop"
          class="bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed px-10 py-5 rounded-xl font-bold">
          Shop Now
        </button>

        <button id="hero-build"
          class="bg-surface-variant/40 px-10 py-5 rounded-xl border border-outline-variant">
          View Product
        </button>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="md:col-span-5 relative">
      <div class="absolute -top-20 -right-20 w-80 h-80 bg-primary/20 blur-[120px] rounded-full"></div>

      <div class="p-4 bg-surface-container-low/40 rounded-[2rem] rotate-3">
        <img id="hero-image"
          class="rounded-[1.5rem] w-full h-[450px] object-cover">
      </div>
    </div>

  </div>
</section>

<!-- ================= CATEGORIES ================= -->
<section class="py-24">
  <h2 class="headline-font text-4xl font-bold mb-10">Categories</h2>

  <div id="categories" class="grid md:grid-cols-4 gap-6"></div>
</section>

<!-- ================= PRODUCTS ================= -->
<section class="py-24">
  <div class="flex justify-between mb-12">
    <h2 class="headline-font text-4xl font-bold">May Interest You</h2>
  </div>

  <div id="interest-products" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
</section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="bg-slate-950 py-12 border-t border-white/5">
  <div class="max-w-screen-2xl mx-auto flex justify-between px-8 text-xs text-slate-500 uppercase">
    <span>© THE GEEK SHOP</span>
    <span>KINETIC LABS</span>
  </div>
</footer>

<!-- ================= SCRIPT ================= -->
<script type="module" src="./Script/index-script.js"></script>

</body>
</html>
