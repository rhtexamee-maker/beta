<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logistics Terminal | KINETIC LABS</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <script type="module" src="Script/status-script.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#070c17",
            surface: "#0c1322",
            "surface-container-low": "#141b2b",
            "surface-container-high": "#232a3a",
            "surface-container-highest": "#2e3545",
            "surface-container-lowest": "#070e1d",
            primary: "#ecd7ff",
            secondary: "#c4c5db",
            outline: "#968e9a",
            "on-surface": "#dce2f7",
            "on-surface-variant": "#cdc3d0"
          },
          fontFamily: {
            headline: ["Space Grotesk"],
            body: ["Inter"],
            label: ["Inter"]
          }
        }
      }
    }
  </script>

  <style>
    body { background:#070c17; }

    .tech-grid-overlay {
      background-image:
        linear-gradient(rgba(236, 215, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236, 215, 255, 0.1) 1px, transparent 1px);
      background-size: 8px 8px;
    }

    .data-stream {
      background-image:
        linear-gradient(0deg, transparent 24%, rgba(236, 215, 255, 0.03) 25%, rgba(236, 215, 255, 0.03) 26%, transparent 27%, transparent 74%, rgba(236, 215, 255, 0.03) 75%, rgba(236, 215, 255, 0.03) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(236, 215, 255, 0.03) 25%, rgba(236, 215, 255, 0.03) 26%, transparent 27%, transparent 74%, rgba(236, 215, 255, 0.03) 75%, rgba(236, 215, 255, 0.03) 76%, transparent 77%, transparent);
      background-size: 40px 40px;
    }

    .scanner-glow {
      box-shadow: 0 0 20px rgba(236,215,255,0.05), inset 0 0 15px rgba(236,215,255,0.02);
    }
  </style>
</head>

<body class="text-on-surface font-body min-h-screen flex flex-col">

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/5">
  <div class="max-w-7xl mx-auto px-8 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-primary font-headline">KINETIC LABS</div>
    <div class="hidden md:flex gap-8 text-sm">
      <a href="products.html" class="hover:text-primary">Shop</a>
      <a href="status.html" class="text-primary">Logistics Terminal</a>
    </div>
  </div>
</nav>

<main class="pt-24 pb-20 data-stream flex-1">
  <div class="max-w-6xl mx-auto px-8">

    <!-- HEADER -->
    <div class="border-l-2 border-primary/30 pl-8 mb-16">
      <div class="flex items-center gap-2 mb-3">
        <div class="w-2 h-2 bg-primary animate-pulse"></div>
        <span class="text-xs uppercase tracking-widest text-primary">LOGISTICS INTERFACE</span>
      </div>
      <h1 class="text-6xl font-headline font-bold mb-4">TRACK GEAR</h1>
      <p class="text-on-surface-variant">Enter phone to track orders</p>
    </div>

    <!-- FORM -->
    <form id="status-form" class="flex gap-4 mb-16">
      <input id="phone-input" type="text"
        placeholder="019XXXXXXXX"
        class="flex-1 bg-surface-container-low border border-white/10 px-6 py-4 text-xl font-headline tracking-widest">
      <button class="bg-primary px-8 font-bold">SEARCH</button>
    </form>

    <!-- RESULTS -->
    <div id="order-result" class="space-y-10"></div>

  </div>
</main>

</body>
</html>
