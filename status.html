<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Logistics Terminal | KINETIC LABS</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script type="module" src="Script/status-script.js"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        background: "#070c17",
        primary: "#ecd7ff",
        secondary: "#c4c5db",
        "surface-container-low": "#141b2b",
        "surface-container-high": "#232a3a",
        "surface-container-lowest": "#070e1d",
        "surface-container-highest": "#2e3545",
        "on-surface": "#dce2f7",
        "on-surface-variant": "#cdc3d0",
        outline: "#968e9a"
      },
      fontFamily: {
        headline: ["Space Grotesk"],
        body: ["Inter"]
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
}
.data-stream {
  background-image:
  linear-gradient(0deg, transparent 24%, rgba(236,215,255,0.03) 25%, transparent 27%),
  linear-gradient(90deg, transparent 24%, rgba(236,215,255,0.03) 25%, transparent 27%);
  background-size: 40px 40px;
}
.scanner-glow {
  box-shadow: 0 0 20px rgba(236,215,255,0.05), inset 0 0 15px rgba(236,215,255,0.02);
}
</style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">

<nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/5">
  <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
    <div class="text-2xl font-bold text-primary">KINETIC LABS</div>
  </div>
</nav>

<main class="pt-16 pb-20 data-stream flex-grow">

<header class="max-w-7xl mx-auto px-8 py-20">
  <h1 class="text-6xl font-bold mb-6">Track Gear</h1>
</header>

<!-- SEARCH -->
<section class="max-w-7xl mx-auto px-8 mb-20">
<form id="status-form" class="flex gap-6">
  <input id="phone-input"
    class="flex-1 p-5 text-2xl bg-surface-container-low border border-white/5"
    placeholder="Phone Number"/>

  <button class="px-10 bg-primary text-black font-bold">
    SEARCH
  </button>
</form>
</section>

<!-- RESULTS GRID -->
<section class="max-w-7xl mx-auto px-8">
  <div id="results-grid"
       class="grid grid-cols-1 md:grid-cols-2 gap-8">
  </div>
</section>

</main>
</body>
</html>
